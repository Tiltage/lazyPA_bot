name: Deploy to Oracle VM

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd ~/lazyPA_bot
            git pull

            # Write .env from secrets
            cat > ~/lazyPA_bot/.env << EOF
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            GOOGLE_PLACES_API_KEY=${{ secrets.GOOGLE_PLACES_API_KEY }}
            EOF

            source venv/bin/activate

            # Check for missing or outdated packages and install only if needed
            echo "Checking requirements..."
            MISSING=$(pip install --dry-run -r requirements.txt 2>&1 | grep -E "Would install" || true)

            if [ -n "$MISSING" ]; then
              echo "Updates found: $MISSING"
              pip install -r requirements.txt
            else
              echo "All requirements satisfied, skipping install."
            fi

            # Clean up logs to prevent disk overload
            find ~/lazyPA_bot/logs -type f -delete 2>/dev/null || true

            sudo systemctl restart lazypa